kind: StressChaos
apiVersion: chaos-mesh.org/v1alpha1
metadata:
  namespace: sock-shop
  name: el-e16-cpu-stress-carts
spec:
  selector:
    namespaces:
      - sock-shop
    labelSelectors:
      name: carts
  mode: all
  containerNames:
    - carts
  stressors:
    cpu:
      workers: 1
      load: 80
