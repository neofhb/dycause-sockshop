kind: NetworkChaos
apiVersion: chaos-mesh.org/v1alpha1
metadata:
  namespace: sock-shop
  name: el-e6-network-delay-orders
spec:
  selector:
    namespaces:
      - sock-shop
    labelSelectors:
      name: orders
  mode: all
  action: delay
  delay:
    latency: "300ms"
    correlation: "0"
    jitter: "0ms"
