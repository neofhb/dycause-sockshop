kind: NetworkChaos
apiVersion: chaos-mesh.org/v1alpha1
metadata:
  namespace: sock-shop
  name: mesh-e5-network-delay-catalogue
spec:
  selector:
    namespaces:
      - sock-shop
    labelSelectors:
      name: catalogue
  mode: all
  action: delay
  delay:
    latency: "300ms"
    correlation: "0"
    jitter: "0ms"
