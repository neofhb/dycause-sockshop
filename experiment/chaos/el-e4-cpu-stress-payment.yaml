kind: StressChaos
apiVersion: chaos-mesh.org/v1alpha1
metadata:
  namespace: sock-shop
  name: el-e4-cpu-stress-payment
spec:
  selector:
    namespaces:
      - sock-shop
    labelSelectors:
      name: payment
  mode: all
  containerNames:
    - payment
  stressors:
    cpu:
      workers: 1
      load: 80
